version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../cloud/docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/freshness
      - MODEL_PATH=/app/models/freshness_model.h5
    volumes:
      - ./ml/models:/app/models
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: ../cloud/docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: freshness
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
